<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER-I APP - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a2a4a 0%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e6ed;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 24px;
            color: #4dabf7;
            margin-bottom: 5px;
        }
        .logo p {
            font-size: 13px;
            color: #8b9bb4;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #b0bcc9;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #4dabf7;
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: #4dabf7;
            color: #0d1b2a;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #74c0fc;
        }
        .error {
            background: rgba(255,77,77,0.15);
            border: 1px solid rgba(255,77,77,0.3);
            color: #ff8787;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 11px;
            color: #5a6b80;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>⚡ SUPER-I APP</h1>
            <p>Data Input Tool — GI MANGGARAI</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>NIP</label>
                <input type="text" name="nip" placeholder="Masukkan NIP" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn">Masuk</button>
        </form>
        <div class="footer">
            Powered by Hermes Agent
        </div>
    </div>
</body>
</html>
